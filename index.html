<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAE 402 la récolte</title>
    <link rel="stylesheet" href="styles/style.css">
</head>

<body>

    <canvas id="monCanva"></canvas>

    <!-- Ecran de consignes au démarrage -->
    <div id="ecranConsignes" class="ecran-consignes">
        <h2 class="ecran-consignes__titre">Consignes</h2>
        <p class="ecran-consignes__texte ecran-consignes__intro">Récolte le plus de pommes possible !</p>

        <div class="ecran-consignes__legende">
            <div class="legende-item">
                <img class="legende-item__img" src="sprites/pommeRouge.png" alt="Pomme normale">
                <div class="legende-item__texte">Pomme rouge: +1</div>
            </div>
            <div class="legende-item">
                <img class="legende-item__img" src="sprites/pommeDoree.png" alt="Pomme dorée">
                <div class="legende-item__texte">Pomme dorée: +10</div>
            </div>
            <div class="legende-item">
                <img class="legende-item__img" src="sprites/pommePourrie.png" alt="Pomme pourrie">
                <div class="legende-item__texte">Pomme pourrie: -5 (et -1 vie)</div>
            </div>
        </div>

        <p class="ecran-consignes__texte ecran-consignes__temps">Temps imparti: <b>30 secondes</b></p>
        <p class="ecran-consignes__texte ecran-consignes__micro">
            Attention: si un pigeon apparaît crie pour le faire fuir !
        </p>
        <button id="btnAutoriserMicro" type="button" class="btn-lancer btn-micro">Autoriser le micro</button>
        <p id="etatMicroConsignes" class="ecran-consignes__texte ecran-consignes__micro-etat">Micro non configuré</p>

        <button id="btnLancerJeu" type="button" class="btn-lancer">Lancer le jeu</button>
        <button id="btnRevoirCinematique" type="button" class="btn-lancer btn-revoir-cinematique cache">Revoir la cinématique</button>
    </div>

    <!-- Cinématique affichée une seule fois après les consignes -->
    <div id="ecranCinematique" class="ecran-cinematique cache" aria-live="polite">
        <div class="ecran-cinematique__scene">
            <img id="imagePommierCinematique" src="sprites/pommier.png" alt="Pommier">
            <img class="pomme-cine pomme-cine--1" src="sprites/pommeRouge.png" alt="">
            <img class="pomme-cine pomme-cine--2" src="sprites/pommeRouge.png" alt="">
            <img class="pomme-cine pomme-cine--3" src="sprites/pommeRouge.png" alt="">
        </div>

        <p id="texteCinematique" class="ecran-cinematique__texte">Secoue ton téléphone !</p>
        <button id="btnSecouerArbre" type="button" class="ecran-cinematique__btn-secret" aria-label="Déclencher la secousse (test PC)"></button>
    </div>

    <!-- Écran qui s'affiche en cas de fin par manque de vies-->
    <div id="ecranGameOver" class="ecran-fin ecran-fin--popup cache">
        <h2 id="gameOverTitre">JEU PERDU !</h2>
        <p id="gameOverScore">Score : 0</p>
        <button id="btnRejouerGameOver" type="button">Rejouer</button>
    </div>

    <!-- Écran qui s'affiche en cas de victoire (temps écoulé)-->
    <div id="ecranVictoire" class="ecran-fin cache">
        <div class="ecran-victoire__contenu">
            <h2 id="victoireTitre">Partie terminée</h2>
            <p id="victoireScore">Score : 0</p>
            <div class="ecran-fin__actions">
                <button id="btnRejouerVictoire" type="button">Rejouer</button>
                <button id="btnContinuerHistoire" type="button">Continuer l'histoire</button>
            </div>
            <img id="imagePanierFin" src="sprites/panier_fin.png" alt="Panier rempli de pommes">
        </div>
    </div>

    <script src="js/elements.js"></script> <!-- sprites, score, vies, timer...-->
    <script src="js/audio.js"></script> <!-- audio du jeu et activation pour la norme...-->
    <script src="js/input.js"></script> <!-- contrôles du jeu (gyroscope tel + souris ordi) et orientation du tel -->
    <script src="js/UI.js"></script> <!-- affichage du score, timer et vies -->
    <script src="js/jeu.js"></script> <!-- script principal du jeu (collisions, dessin des éléments, boutons...) -->
</body>

</html>
